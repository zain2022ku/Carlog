<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Car Log</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CarLog">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/743/743131.png">

<style>
:root { --a:#2563eb; --bg:#f1f5f9; }

body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg);
}

/* FULL SCREEN CONTAINER */
.app {
    padding:20px;
    padding-top: calc(20px + env(safe-area-inset-top));
    min-height:100vh;
}

/* Tabs */
.tabs {
    display:flex;
    border-bottom:2px solid #ddd;
    margin-bottom:15px;
}
.tab-btn {
    flex:1;
    padding:12px;
    border:none;
    background:none;
    font-weight:bold;
    cursor:pointer;
    color:#666;
}
.tab-btn.active {
    color:var(--a);
    border-bottom:3px solid var(--a);
}

.tab-content { display:none; }
.tab-content.active { display:block; }

/* Inputs - Set to 16px to prevent iOS auto-zoom */
label {
    font-weight:600;
    margin-top:10px;
    display:block;
}
select, input, textarea {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-top:5px;
    margin-bottom:10px;
    font-size:16px; 
    box-sizing: border-box;
}

/* Buttons */
.row { display:flex; gap:8px; }

.btn {
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    touch-action: manipulation;
}

.btn-main {
    background:var(--a);
    color:white;
    width:100%;
    font-size:16px;
}

.btn-add {
    background:#16a34a;
    color:white;
    width:60px;
    font-size:20px;
}

.btn-del {
    background:#dc2626;
    color:white;
    width:60px;
    font-size:20px;
}

/* Logs */
.log {
    background:white;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="app">

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event,'entry')">Entry</button>
    <button class="tab-btn" onclick="openTab(event,'logs')">Log Book</button>
</div>

<div id="entry" class="tab-content active">

<label>Car</label>
<div class="row">
    <select id="car">
        <option>B090</option>
        <option>B087</option>
        <option>B088</option>
        <option>B126</option>
        <option>A036</option>
    </select>
    <button class="btn btn-add" onclick="addCar()">+</button>
    <button class="btn btn-del" onclick="deleteCar()">−</button>
</div>

<label>Time OUT</label>
<input type="datetime-local" id="out">

<label>Time IN</label>
<input type="datetime-local" id="in">

<label>Remarks</label>
<textarea id="remarks" placeholder="Enter remarks..."></textarea>

<button class="btn btn-main" onclick="addLog()">Add Log</button>

</div>

<div id="logs" class="tab-content">
    <div id="list"></div>
</div>

</div>

<script>
// Tabs
function openTab(e,name){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    e.currentTarget.classList.add('active');
}

// Data Handling
let cars = JSON.parse(localStorage.getItem("cars")) || ["B090","B087","B088","B126","A036"];
let logs = JSON.parse(localStorage.getItem("logs")) || [];

function save(){
    localStorage.setItem("cars",JSON.stringify(cars));
    localStorage.setItem("logs",JSON.stringify(logs));
}

// Load cars into dropdown
function loadCars(){
    let s=document.getElementById("car");
    s.innerHTML="";

    cars.forEach(c=>{
        let o=document.createElement("option");
        o.text=c;
        s.add(o);
    });
}

// Add car
function addCar(){
    let name=prompt("New car ID:");
    if(!name) return;

    if(cars.includes(name.toUpperCase())){
        alert("Car already exists");
        return;
    }

    cars.push(name.toUpperCase());
    save();
    loadCars();
}

// Delete car
function deleteCar(){
    let select = document.getElementById("car");
    let car = select.value;

    if(!car){
        alert("No car selected");
        return;
    }

    let p = prompt(`Type DELETE to remove ${car}`);
    if(p !== "DELETE") return;

    cars = cars.filter(c => c !== car);
    save();
    loadCars();
}

// Add log
function addLog(){
    let car=document.getElementById("car").value;
    let out=document.getElementById("out").value;
    let inn=document.getElementById("in").value;
    let remarks=document.getElementById("remarks").value;

    if(!out){
        alert("Enter Time OUT");
        return;
    }

    logs.push({
        car, out, in:inn||"-", remarks
    });

    save();
    render();
    alert("Log Added Successfully");

    // Reset fields
    document.getElementById("out").value="";
    document.getElementById("in").value="";
    document.getElementById("remarks").value="";
}

// Render the Log Book
function render(){
    let d=document.getElementById("list");
    d.innerHTML="";

    if(logs.length === 0) {
        d.innerHTML = "<p style='text-align:center; color:#888;'>No logs yet.</p>";
        return;
    }

    logs.forEach((l,i)=>{
        let div=document.createElement("div");
        div.className="log";
        div.innerHTML=`
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <span><b>${l.car}</b></span>
                <button class="btn btn-del" style="width:30px; height:30px; padding:0; font-size:14px;" onclick="del(${i})">X</button>
            </div>
            <div style="font-size:14px; color:#444; margin-top:5px;">
                OUT: ${l.out.replace('T', ' ')}<br>
                IN: ${l.in.replace('T', ' ')}<br>
                Remarks: ${l.remarks || "-"}
            </div>
        `;
        d.appendChild(div);
    });
}

// Delete log with password
function del(i){
    let p=prompt("Enter admin password to delete:");
    if(p==="203040"){
        logs.splice(i,1);
        save();
        render();
    } else {
        alert("Wrong password");
    }
}

// Initialize on Load
window.onload = function() {
    loadCars();
    render();
};

</script>

</body>
</html>
